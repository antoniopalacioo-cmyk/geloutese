<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gelou — Pediu, Chegou</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0D2240;
  --blue: #1565C8;
  --sky: #2196F3;
  --ice: #E3F2FD;
  --amber: #FFB300;
  --bg: #F5F8FF;
  --white: #FFFFFF;
  --text: #1A2733;
  --muted: #607080;
  --border: #DDE8F5;
  --green: #00C853;
  --red: #F44336;
  --radius: 16px;
  --shadow: 0 2px 12px rgba(21,101,200,0.10);
  --shadow-lg: 0 8px 32px rgba(21,101,200,0.15);
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── HEADER ── */
header {
  background: #EDF0F9;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 3px 16px rgba(13,34,64,0.13);
  border-bottom: 3px solid #1565C8;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 24px 4px 16px;
  max-width: 960px;
  margin: 0 auto;
}
header img {
  height: 116px;
  width: auto;
  object-fit: contain;
  display: block;
}
.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
.location-tag {
  font-size: 0.7rem;
  color: #0D2240;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 800;
  opacity: 0.7;
}
.header-status-row {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.badge-open {
  font-size: 0.72rem;
  font-weight: 800;
  background: #E8F5E9;
  color: #1B5E20;
  border: 1.5px solid #A5D6A7;
  border-radius: 20px;
  padding: 3px 10px;
  letter-spacing: 0.3px;
}
.badge-delivery {
  font-size: 0.72rem;
  font-weight: 800;
  background: #E3F2FD;
  color: #0D47A1;
  border: 1.5px solid #90CAF9;
  border-radius: 20px;
  padding: 3px 10px;
  letter-spacing: 0.3px;
}
@media (max-width: 480px) {
  header img { height: 88px; }
  .header-inner { padding: 4px 16px; }
}

/* ── FAIXA DE CONFIANÇA ── */
.trust-strip {
  background: var(--navy);
  padding: 9px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 36px;
}
.trust-item {
  font-size: 0.74rem;
  font-weight: 700;
  color: #D7E8FF;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
  position: absolute;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.trust-item.active {
  opacity: 1;
  position: relative;
}

/* ── BARRA DE BUSCA ── */
.search-bar-wrap {
  position: sticky;
  top: 128px;
  z-index: 95;
  background: var(--white);
  padding: 10px 16px;
  border-bottom: 1.5px solid var(--border);
  box-shadow: 0 2px 6px rgba(13,34,64,0.05);
}
@media (max-width: 480px) {
  .search-bar-wrap { top: 100px; }
}
.search-bar {
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 0 12px;
  height: 40px;
}
.search-bar input {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  height: 100%;
}
.search-bar input::placeholder { color: var(--muted); }
.search-icon { font-size: 0.95rem; opacity: 0.6; flex-shrink: 0; }
.search-clear-btn {
  background: var(--border);
  border: none;
  border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 0.7rem;
  color: var(--muted);
  flex-shrink: 0;
}
.search-empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
  font-size: 0.9rem;
  font-weight: 600;
}

/* ── CARD DE CATEGORIA VAZIA (combos) ── */
.empty-cat-card {
  background: var(--white);
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  padding: 22px 16px;
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 10px;
}
.empty-cat-card strong { color: var(--navy); display: block; font-size: 0.95rem; margin-bottom: 4px; }

/* ── MODAL IMAGEM PRODUTO ── */
#img-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#img-modal-overlay.open { display: flex; }
#img-modal {
  background: #fff;
  border-radius: 20px;
  max-width: 360px;
  width: 100%;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: modalPop 0.25s ease;
}
@keyframes modalPop {
  from { transform: scale(0.85); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
#img-modal-img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: contain;
  background: linear-gradient(160deg, var(--ice) 0%, var(--bg) 100%);
  padding: 16px;
  box-sizing: border-box;
}
#img-modal-body {
  padding: 16px 20px 20px;
}
#img-modal-name {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--navy);
  margin-bottom: 4px;
}
#img-modal-price {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--blue);
  margin-bottom: 6px;
}
#img-modal-promo {
  font-size: 0.82rem;
  color: var(--green);
  font-weight: 700;
  margin-bottom: 12px;
}
#img-modal-qty-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.img-modal-qty-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: #fff;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--navy);
  transition: background 0.15s;
}
.img-modal-qty-btn:active { background: var(--ice); }
#img-modal-qty {
  font-size: 1.3rem;
  font-weight: 900;
  color: var(--navy);
  min-width: 28px;
  text-align: center;
}
.img-modal-promo-shortcut {
  background: linear-gradient(90deg, var(--green), #27ae60);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.8rem;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
}
#img-modal-actions {
  display: flex;
  gap: 10px;
}
.img-modal-close-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: #fff;
  color: var(--text);
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
}
.img-modal-add-btn {
  flex: 2;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: var(--blue);
  color: #fff;
  font-weight: 800;
  font-size: 0.95rem;
  cursor: pointer;
}

/* ── FLY TO CART ── */
.fly-img {
  position: fixed;
  width: 60px; height: 60px;
  object-fit: contain;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              top 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              left 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              opacity 0.7s ease,
              width 0.7s ease,
              height 0.7s ease;
}

/* ── BARRA CHECKOUT IFOOD ── */
#checkout-bar {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 300;
  background: var(--blue);
  color: #fff;
  padding: 14px 20px;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
  cursor: pointer;
  transition: transform 0.3s ease;
}
#checkout-bar.visible { display: flex; }
#checkout-bar:active { transform: scale(0.99); }
.checkout-bar-left {
  display: flex; align-items: center; gap: 10px;
}
.checkout-bar-badge {
  background: var(--amber);
  color: var(--navy);
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 900;
  flex-shrink: 0;
}
.checkout-bar-label {
  font-size: 0.95rem; font-weight: 700;
}
.checkout-bar-right {
  display: flex; align-items: center; gap: 8px;
  font-weight: 800; font-size: 1rem;
  white-space: nowrap;
}
.checkout-bar-cta {
  background: #fff;
  color: var(--blue);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 0.85rem;
  font-weight: 900;
}

/* ── CARRINHO FLUTUANTE (mobile) ── */
.cart-fab {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 200;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 14px 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(21,101,200,0.4);
  align-items: center;
  gap: 8px;
  transition: transform 0.2s, box-shadow 0.2s;
}
.cart-fab:active { transform: scale(0.96); }
.cart-fab .fab-count {
  background: var(--amber);
  color: var(--navy);
  border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  font-weight: 900;
}
@media (max-width: 699px) {
  .cart-fab { display: flex; }
}

/* ── LAYOUT ── */
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 14px 140px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}
@media (min-width: 700px) {
  .container {
    grid-template-columns: 1fr 360px;
    align-items: start;
    padding-bottom: 40px;
  }
}

/* ── CATEGORIA ── */
.category-section { margin-bottom: 8px; }
.category-label {
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 4px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.category-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── PRODUCT CARD ── */
.product-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
  cursor: default;
}
.product-card:hover {
  box-shadow: var(--shadow);
  border-color: #90CAF9;
  transform: translateY(-1px);
}
.product-card.out-of-stock {
  opacity: 0.6;
  position: relative;
}
.product-card.out-of-stock .qty-control {
  pointer-events: none;
  opacity: 0.35;
}
.out-of-stock-badge {
  display: inline-block;
  margin-top: 6px;
  background: #e53935;
  color: #fff;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 3px 9px;
  border-radius: 20px;
}
.product-card.in-cart {
  border-color: var(--sky);
  background: #F0F8FF;
}
.product-img {
  width: 100px; height: 100px;
  object-fit: contain;
  border-radius: 12px;
  background: linear-gradient(160deg, var(--ice) 0%, var(--bg) 100%);
  border: 1px solid var(--border);
  padding: 4px;
  box-sizing: border-box;
  flex-shrink: 0;
}
.product-img-fallback {
  width: 100px; height: 100px;
  flex-shrink: 0; border-radius: 12px;
  background: linear-gradient(160deg, var(--ice) 0%, var(--bg) 100%);
  border: 1px solid var(--border);
  display: none;
  align-items: center; justify-content: center;
  font-size: 2.4rem;
}
.product-info { flex: 1; min-width: 0; }
.product-name {
  font-size: 0.96rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}
.product-price {
  font-size: 0.9rem;
  color: var(--blue);
  font-weight: 800;
  margin-top: 2px;
}
.qty-control {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.qty-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid var(--blue);
  background: transparent;
  color: var(--blue);
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.qty-btn:active { background: var(--blue); color: white; transform: scale(0.9); }
.qty-display {
  width: 26px;
  text-align: center;
  font-weight: 900;
  font-size: 1rem;
  color: var(--text);
}

/* ── PAINEL DO PEDIDO ── */
.order-panel {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
@media (min-width: 700px) {
  .order-panel { position: sticky; top: 110px; }
}

/* Mobile: painel vira sheet quando aberto */
@media (max-width: 699px) {
  .order-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    border-radius: 20px 20px 0 0;
    z-index: 150;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.2);
  }
  .order-panel.open {
    transform: translateY(0);
  }
  .order-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 140;
  }
  .order-overlay.open { display: block; }
}

.panel-header {
  background: var(--navy);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-title {
  font-size: 1rem;
  font-weight: 900;
  color: white;
  letter-spacing: 0.5px;
}
.panel-close {
  display: none;
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  width: 30px; height: 30px;
  border-radius: 50%;
  font-size: 1.1rem;
  cursor: pointer;
  align-items: center; justify-content: center;
}
@media (max-width: 699px) {
  .panel-close { display: flex; }
}
.panel-drag {
  display: none;
  width: 36px; height: 4px;
  background: rgba(255,255,255,0.3);
  border-radius: 2px;
  margin: 0 auto;
}
@media (max-width: 699px) {
  .panel-drag { display: block; margin: 8px auto 0; }
}

.panel-body { padding: 16px 18px; }

.order-items {
  min-height: 50px;
  margin-bottom: 14px;
}
.order-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.83rem;
}
.order-item:last-child { border-bottom: none; }
.order-item-name { color: var(--muted); flex: 1; font-weight: 600; }
.order-item-sub { font-weight: 800; color: var(--blue); margin-left: 8px; }
.order-item-remove {
  background: none;
  border: none;
  color: #ccc;
  font-size: 1.1rem;
  cursor: pointer;
  padding: 0 4px 0 8px;
  line-height: 1;
  transition: color 0.15s;
}
.order-item-remove:hover { color: #e74c3c; }
.order-empty {
  font-size: 0.83rem;
  color: var(--muted);
  text-align: center;
  padding: 16px 0;
  font-weight: 600;
}

.totals-block {
  background: var(--bg);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 16px;
}
.totals-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.83rem;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 6px;
}
.totals-row:last-child {
  margin-bottom: 0;
  padding-top: 8px;
  border-top: 1.5px solid var(--border);
  font-size: 1rem;
  font-weight: 900;
  color: var(--text);
}
.totals-row:last-child span:last-child { color: var(--blue); font-size: 1.1rem; }

/* ── FORM ── */
.form-group { margin-bottom: 12px; }
.form-label {
  display: block;
  font-size: 0.72rem;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 11px 13px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--sky);
  box-shadow: 0 0 0 3px rgba(33,150,243,0.12);
  background: var(--white);
}
.form-textarea { resize: none; min-height: 64px; }

.cep-row { display: flex; gap: 8px; align-items: center; }
.cep-row .form-input { flex: 1; }
.cep-status {
  font-size: 0.8rem;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}
.cep-ok { color: var(--green); }
.cep-err { color: var(--red); }
.cep-loading { color: var(--sky); }

.payment-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.pay-btn {
  padding: 10px 6px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 800;
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.pay-btn.selected {
  border-color: var(--blue);
  background: var(--blue);
  color: white;
}

.troco-options {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.troco-btn {
  padding: 10px 6px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  font-weight: 800;
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.troco-btn.selected {
  border-color: var(--blue);
  background: var(--blue);
  color: white;
}

.frete-info {
  background: var(--ice);
  border: 1.5px solid #90CAF9;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.83rem;
  color: var(--navy);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  margin-bottom: 12px;
}

/* ── BOTÃO ENVIAR ── */
.send-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 900;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: opacity 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.send-btn:active { transform: scale(0.98); opacity: 0.9; }

.toast-overlay {

}
